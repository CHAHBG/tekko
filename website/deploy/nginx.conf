###############################################################################
# CardTap — Nginx reverse proxy config
# Server: Hetzner CAX11 ARM64 at 178.104.176.213
#
# Place this file at: /etc/nginx/sites-available/cardtap
# Then: ln -s /etc/nginx/sites-available/cardtap /etc/nginx/sites-enabled/
#
# For HTTPS (required for CinetPay webhooks):
#   certbot --nginx -d yourdomain.com
###############################################################################

# HTTP — redirect to HTTPS once you have a domain + cert
server {
    listen 80;
    server_name 178.104.176.213 _;          # replace with your domain when ready

    # Allow Let's Encrypt ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        'upgrade';
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # File upload size limit (match multer limit in server/index.js)
        client_max_body_size 12M;
    }
}

